name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  #  PHP Tests & Static Analysis
  # ═══════════════════════════════════════════════════════════════════════
  php:
    name: PHP ${{ matrix.php }} — Tests & PHPStan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, gd, intl
          coverage: ${{ matrix.php == '8.3' && 'pcov' || 'none' }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run PHP tests
        run: |
          if [ "${{ matrix.php }}" = "8.3" ]; then
            php artisan test --parallel --coverage --min=60
          else
            php artisan test --parallel
          fi
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  # ═══════════════════════════════════════════════════════════════════════
  #  Code Style (Laravel Pint)
  # ═══════════════════════════════════════════════════════════════════════
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Laravel Pint (dry-run)
        run: vendor/bin/pint --test

  # ═══════════════════════════════════════════════════════════════════════
    # ═══════════════════════════════════════════════════════════════════════
  #  Frontend — Build & Lint
  # ═══════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend — Build & ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint (a11y)
        run: npx eslint resources/js

      - name: Build frontend
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════
  #  Security Audit
  # ═══════════════════════════════════════════════════════════════════════
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer audit
        run: composer audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
